name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Assemble just the web assets into a scratch directory so the
      # iOS project, node_modules and SQL schemas never hit the Pages
      # artifact. Everything the browser needs ships; nothing else.
      - name: Collect web artefact
        run: |
          mkdir -p _pages
          cp index.html main.js config.js manifest.json .nojekyll _pages/
          cp -r css core modules _pages/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
